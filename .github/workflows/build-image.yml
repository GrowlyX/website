name: Build & Push Website Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'charts/**'
      - 'scripts/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: build-growly-website
  cancel-in-progress: true

jobs:
  build:
    name: Build & push to in-cluster registry
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."127.0.0.1:5000"]
              http = true
              insecure = true

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_TS=$(date -u +%Y%m%d%H%M%S)
          echo "tag=${BUILD_TS}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Port-forward, build & push
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          kubectl -n registry port-forward svc/internal-registry-docker-registry 5000:5000 \
            >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap 'kill "${PF_PID}" 2>/dev/null || true' EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/v2/ >/dev/null 2>&1; then
              echo "registry reachable"
              break
            fi
            if ! kill -0 "${PF_PID}" 2>/dev/null; then
              echo "port-forward exited:" >&2
              cat /tmp/pf.log >&2
              exit 1
            fi
            sleep 1
          done

          if ! curl -fsS http://127.0.0.1:5000/v2/ >/dev/null 2>&1; then
            echo "registry not reachable after 30s" >&2
            cat /tmp/pf.log >&2
            exit 1
          fi

          IMAGE="127.0.0.1:5000/growly-website"
          docker buildx build \
            --file Dockerfile \
            --tag "${IMAGE}:${IMAGE_TAG}" \
            --tag "${IMAGE}:latest" \
            --cache-from "type=registry,ref=${IMAGE}:buildcache" \
            --cache-to   "type=registry,ref=${IMAGE}:buildcache,mode=max" \
            --provenance=false \
            --push \
            .
