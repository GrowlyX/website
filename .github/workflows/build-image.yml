name: Build & Push Website Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'charts/**'
      - 'scripts/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: build-growly-website
  cancel-in-progress: true

jobs:
  build:
    name: Build & push to in-cluster registry
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Port-forward in-cluster registry
        run: |
          kubectl -n registry port-forward svc/internal-registry-docker-registry 5000:5000 &
          echo $! > /tmp/pf.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/v2/ >/dev/null 2>&1; then
              echo "registry reachable"; break
            fi
            sleep 1
          done

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_TS=$(date -u +%Y%m%d%H%M%S)
          echo "tag=${BUILD_TS}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            127.0.0.1:5000/growly-website:${{ steps.meta.outputs.tag }}
            127.0.0.1:5000/growly-website:latest
          cache-from: type=registry,ref=127.0.0.1:5000/growly-website:buildcache
          cache-to: type=registry,ref=127.0.0.1:5000/growly-website:buildcache,mode=max
          provenance: false

      - name: Stop port-forward
        if: always()
        run: |
          if [ -f /tmp/pf.pid ]; then kill "$(cat /tmp/pf.pid)" || true; fi
