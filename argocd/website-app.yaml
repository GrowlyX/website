# =============================================================================
# Growly Website — single ArgoCD Application.
#
# Reuses the existing breezy cluster infrastructure (ArgoCD, registry,
# argocd-image-updater, infisical-operator, cloudflare-tunnel). Only deploys
# the Next.js website + its MongoDB into the `growly-system` namespace.
#
# Apply once:  kubectl apply -f argocd/website-app.yaml
# (scripts/deploy.sh handles this plus the prerequisite secrets.)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: growly-website
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: website=internal-registry-docker-registry.registry.svc.cluster.local:5000/growly-website
    argocd-image-updater.argoproj.io/website.update-strategy: newest-build
    argocd-image-updater.argoproj.io/website.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/website.helm.image-tag: image.tag
spec:
  project: default
  source:
    repoURL: 'https://github.com/GrowlyX/website'
    path: charts/website
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: growly-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
