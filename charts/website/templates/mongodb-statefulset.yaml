{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.mongodb.service.name }}
  labels:
    app: {{ .Values.mongodb.service.name }}
spec:
  serviceName: {{ .Values.mongodb.service.name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mongodb.service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mongodb.service.name }}
    spec:
      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          ports:
            - name: mongo
              containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.credentialsSecret }}
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.credentialsSecret }}
                  key: password
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.mongodb.database | quote }}
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.mongodb.storage.storageClass }}
        storageClassName: {{ .Values.mongodb.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongodb.storage.size }}
{{- end }}
